name: CI

on:
  push:
    branches: [main]
    paths:
      - 'product/app/**'
  pull_request:
    branches: [main]
    paths:
      - 'product/app/**'

defaults:
  run:
    working-directory: product/app

jobs:
  lint-and-test:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: product/app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npx vitest run

      - name: Build
        run: npx next build
