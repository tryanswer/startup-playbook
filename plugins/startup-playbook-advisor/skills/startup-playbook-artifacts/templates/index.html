<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Startup Playbook</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Satoshi, "Geist", "Avenir Next", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: #f6f7f2;
      --surface: #ffffff;
      --surface-soft: #eef1e9;
      --ink: #17201d;
      --muted: #63706a;
      --line: #d9ded4;
      --accent: #0f766e;
      --accent-soft: #dcebe7;
      --warning: #9a6a14;
      --shadow: 0 24px 60px -38px rgba(18, 31, 28, 0.45);
      background: var(--bg);
      color: var(--ink);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-width: 320px;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.08), transparent 34rem),
        radial-gradient(circle at 84% 8%, rgba(154, 106, 20, 0.08), transparent 24rem),
        var(--bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(23, 32, 29, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(23, 32, 29, 0.035) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.38), transparent 68%);
    }

    main {
      width: calc(100% - 40px);
      max-width: 1180px;
      margin: 0 auto;
      padding: 34px 0 60px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      padding: 12px 0 28px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 12px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(34px, 5vw, 64px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 18px 0 0;
      max-width: 62ch;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.55;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 34px;
      padding: 0 13px;
      border: 1px solid rgba(15, 118, 110, 0.24);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      color: var(--accent);
      font-size: 13px;
      font-weight: 750;
      box-shadow: var(--shadow);
      white-space: nowrap;
    }

    .status-pill::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 5px rgba(15, 118, 110, 0.12);
    }

    .stage-rail {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 0;
      margin: 22px 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
    }

    .stage-step {
      min-width: 0;
      padding: 13px 15px 14px;
      border: 0;
      border-right: 1px solid var(--line);
      background: transparent;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      transition: background 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    .stage-step:last-child { border-right: 0; }

    .stage-step:hover {
      background: rgba(220, 235, 231, 0.46);
    }

    .stage-step:active {
      transform: translateY(1px);
    }

    .stage-step[aria-selected="true"] {
      background: var(--accent-soft);
      box-shadow: inset 0 -3px 0 var(--accent);
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .stage-step strong,
    .metric strong,
    .artifact-nav a {
      display: block;
      margin-top: 5px;
      overflow-wrap: anywhere;
      font-weight: 760;
    }

    .dashboard {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(300px, 0.8fr);
      gap: 18px;
      align-items: start;
    }

    .decision-panel,
    .evidence-board,
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
    }

    .decision-panel {
      padding: clamp(22px, 4vw, 36px);
    }

    .decision-topline {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 26px;
    }

    h2 {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    h3 {
      margin: 0 0 14px;
      font-size: 15px;
      letter-spacing: 0;
    }

    .decision-badge {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .reasoning {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 28px;
    }

    .metric {
      min-width: 0;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .metric strong {
      font-family: "JetBrains Mono", "SFMono-Regular", ui-monospace, Consolas, monospace;
      font-size: 24px;
      letter-spacing: 0;
    }

    .evidence-board {
      padding: 22px;
    }

    .evidence-list,
    .artifact-list,
    .clean-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .evidence-list li,
    .clean-list li {
      padding: 14px 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.5;
    }

    .evidence-list li:first-child,
    .clean-list li:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .evidence-list strong {
      display: block;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .risk-next-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
      gap: 18px;
      margin-top: 18px;
    }

    .panel {
      padding: 22px;
    }

    .artifact-nav {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .artifact-list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .artifact-list a {
      display: block;
      min-height: 44px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--accent);
      text-decoration: none;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .artifact-list a:hover {
      border-color: rgba(15, 118, 110, 0.34);
      background: var(--accent-soft);
      transform: translateY(-1px);
    }

    .artifact-list a:active {
      transform: translateY(0) scale(0.99);
    }

    .stage-detail[hidden] { display: none; }

    code {
      padding: 2px 5px;
      border-radius: 5px;
      background: var(--surface-soft);
      color: var(--ink);
      font-family: "JetBrains Mono", "SFMono-Regular", ui-monospace, Consolas, monospace;
      font-size: 0.92em;
    }

    @media (max-width: 900px) {
      .dashboard,
      .risk-next-grid {
        grid-template-columns: 1fr;
      }

      .artifact-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      main {
        width: calc(100% - 28px);
        padding: 22px 0 42px;
      }

      header {
        grid-template-columns: 1fr;
        align-items: start;
        gap: 16px;
      }

      .stage-rail {
        grid-template-columns: 1fr;
      }

      .stage-step {
        border-right: 0;
        border-top: 1px solid var(--line);
      }

      .stage-step:first-child { border-top: 0; }

      .metrics,
      .artifact-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <p class="eyebrow">Startup Playbook</p>
        <h1>Project Name</h1>
        <p class="subtitle">One-line promise.</p>
      </div>
      <div class="status-pill status-waiting" id="stage-status">Validate stage</div>
    </header>

    <nav class="stage-rail" role="tablist" aria-label="Startup stage pipeline">
      <button class="stage-step" type="button" role="tab" data-stage-tab="validate" aria-selected="true" aria-controls="stage-panel"><span class="label">Stage 01</span><strong>Validate</strong></button>
      <button class="stage-step" type="button" role="tab" data-stage-tab="business-model" aria-selected="false" aria-controls="stage-panel"><span class="label">Stage 02</span><strong>Business Model</strong></button>
      <button class="stage-step" type="button" role="tab" data-stage-tab="build" aria-selected="false" aria-controls="stage-panel"><span class="label">Stage 03</span><strong>Build</strong></button>
      <button class="stage-step" type="button" role="tab" data-stage-tab="grow" aria-selected="false" aria-controls="stage-panel"><span class="label">Stage 04</span><strong>Grow</strong></button>
      <button class="stage-step" type="button" role="tab" data-stage-tab="operate" aria-selected="false" aria-controls="stage-panel"><span class="label">Stage 05</span><strong>Operate</strong></button>
    </nav>

    <section class="stage-detail" id="stage-panel" data-stage-panel="validate" role="tabpanel" aria-live="polite"></section>

    <script type="application/json" id="playbook-data">
      {
        "projectId": "project-id",
        "currentStage": "validate",
        "stages": {
          "validate": {
            "label": "Validate",
            "title": "No decision recorded yet",
            "score": null,
            "decision": null,
            "nextAction": "stay",
            "summary": "No decision has been recorded. Add sourced evidence before advancing the pipeline.",
            "evidence": ["No evidence linked yet.", "No known facts recorded yet.", "No assumptions recorded yet."],
            "risks": ["Evidence is missing."],
            "nextSteps": ["Capture raw evidence and add evidence IDs.", "Refresh the current stage report and handoff."],
            "links": [
              ["report.md", "stages/validate/report.md"],
              ["report.json", "stages/validate/report.json"],
              ["handoff.json", "stages/validate/handoff.json"],
              ["input.json", "stages/validate/input.json"]
            ]
          },
          "business-model": {
            "label": "Business Model",
            "title": "Business model not run yet",
            "score": null,
            "decision": null,
            "nextAction": "stay",
            "summary": "Run the business-model stage after validation produces a usable handoff.",
            "evidence": ["No business-model evidence linked yet."],
            "risks": ["Pricing and buyer are unknown."],
            "nextSteps": ["Use validate/handoff.json as input."],
            "links": [
              ["report.md", "stages/business-model/report.md"],
              ["report.json", "stages/business-model/report.json"],
              ["handoff.json", "stages/business-model/handoff.json"],
              ["input.json", "stages/business-model/input.json"]
            ]
          },
          "build": {
            "label": "Build",
            "title": "Build not run yet",
            "score": null,
            "decision": null,
            "nextAction": "stay",
            "summary": "Run build only after the promise, buyer, and first paid test are clear.",
            "evidence": ["No build evidence linked yet."],
            "risks": ["Building before validation can hide weak demand."],
            "nextSteps": ["Use business-model/handoff.json as input."],
            "links": [
              ["report.md", "stages/build/report.md"],
              ["report.json", "stages/build/report.json"],
              ["handoff.json", "stages/build/handoff.json"],
              ["input.json", "stages/build/input.json"]
            ]
          },
          "grow": {
            "label": "Grow",
            "title": "Growth not run yet",
            "score": null,
            "decision": null,
            "nextAction": "stay",
            "summary": "Run growth planning after a concrete product surface and conversion action exist.",
            "evidence": ["No growth evidence linked yet."],
            "risks": ["Traffic before conversion clarity wastes effort."],
            "nextSteps": ["Use build/handoff.json as input."],
            "links": [
              ["report.md", "stages/grow/report.md"],
              ["report.json", "stages/grow/report.json"],
              ["handoff.json", "stages/grow/handoff.json"],
              ["input.json", "stages/grow/input.json"]
            ]
          },
          "operate": {
            "label": "Operate",
            "title": "Operate not run yet",
            "score": null,
            "decision": null,
            "nextAction": "stay",
            "summary": "Run operate after real metrics, revenue, or feedback exists.",
            "evidence": ["No operate evidence linked yet."],
            "risks": ["No metrics are available."],
            "nextSteps": ["Use grow/handoff.json as input."],
            "links": [
              ["report.md", "stages/operate/report.md"],
              ["report.json", "stages/operate/report.json"],
              ["handoff.json", "stages/operate/handoff.json"],
              ["input.json", "stages/operate/input.json"]
            ]
          }
        }
      }
    </script>
    <script>
      const playbookData = JSON.parse(document.getElementById("playbook-data").textContent);
      const panel = document.querySelector("[data-stage-panel]");
      const statusPill = document.getElementById("stage-status");
      const tabs = Array.from(document.querySelectorAll("[data-stage-tab]"));

      function listItems(items) {
        return (items || []).map((item) => `<li>${item}</li>`).join("");
      }

      function artifactLinks(links) {
        return (links || []).map(([label, href]) => `<li><a href="${href}">${label}</a></li>`).join("");
      }

      function switchStage(stageKey) {
        const stage = playbookData.stages[stageKey] || playbookData.stages.validate;
        panel.dataset.stagePanel = stageKey;
        statusPill.textContent = `${stage.label} stage`;
        tabs.forEach((tab) => {
          const selected = tab.dataset.stageTab === stageKey;
          tab.setAttribute("aria-selected", String(selected));
        });
        panel.innerHTML = `
          <section class="dashboard" aria-label="${stage.label} stage status">
            <article class="decision-panel">
              <div class="decision-topline">
                <h2>${stage.title}</h2>
                <span class="decision-badge">Score: ${stage.score ?? "not scored"}</span>
              </div>
              <p class="reasoning">${stage.summary}</p>
              <div class="metrics">
                <div class="metric"><span class="label">Stage</span><strong>${stageKey}</strong></div>
                <div class="metric"><span class="label">Decision</span><strong>${stage.decision ?? "none"}</strong></div>
                <div class="metric"><span class="label">Next action</span><strong>${stage.nextAction ?? "stay"}</strong></div>
              </div>
            </article>
            <aside class="evidence-board" aria-label="${stage.label} evidence">
              <h3>Evidence / Known Context</h3>
              <ul class="evidence-list">${listItems(stage.evidence)}</ul>
            </aside>
          </section>
          <section class="risk-next-grid" aria-label="${stage.label} risks and next actions">
            <article class="panel"><h3>Risks</h3><ul class="clean-list">${listItems(stage.risks)}</ul></article>
            <article class="panel"><h3>Next Actions</h3><ul class="clean-list">${listItems(stage.nextSteps)}</ul></article>
          </section>
          <nav class="artifact-nav" aria-label="${stage.label} artifact links">
            <ul class="artifact-list">${artifactLinks(stage.links)}</ul>
          </nav>
        `;
      }

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => switchStage(tab.dataset.stageTab));
        tab.addEventListener("keydown", (event) => {
          if (!["ArrowLeft", "ArrowRight"].includes(event.key)) return;
          event.preventDefault();
          const index = tabs.indexOf(tab);
          const nextIndex = event.key === "ArrowRight"
            ? (index + 1) % tabs.length
            : (index - 1 + tabs.length) % tabs.length;
          tabs[nextIndex].focus();
          switchStage(tabs[nextIndex].dataset.stageTab);
        });
      });

      switchStage(playbookData.currentStage || "validate");
    </script>
  </main>
</body>
</html>
