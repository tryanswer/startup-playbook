<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Startup Playbook</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      --bg: #f5f5f7;
      --surface: #ffffff;
      --surface-soft: #f2f2f7;
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --line: rgba(0, 0, 0, 0.09);
      --line-strong: rgba(0, 0, 0, 0.14);
      --accent: #0071e3;
      --accent-soft: #e8f2ff;
      --shadow: 0 18px 45px -30px rgba(0, 0, 0, 0.34);
      --segment-bg: rgba(232, 232, 237, 0.82);
      background: var(--bg);
      color: var(--ink);
    }

    * { box-sizing: border-box; }

    html { background: var(--bg); }

    body {
      margin: 0;
      min-width: 320px;
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    main {
      width: min(1180px, calc(100% - 48px));
      margin: 0 auto;
      padding: 34px 0 64px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: end;
      padding: 22px 0 18px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(36px, 5vw, 62px);
      font-weight: 700;
      line-height: 1.02;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 14px 0 0;
      max-width: 64ch;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      -webkit-backdrop-filter: saturate(180%) blur(16px);
      backdrop-filter: saturate(180%) blur(16px);
    }

    .status-pill::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #34c759;
    }

    .stage-rail.segment-control {
      position: sticky;
      top: 12px;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 4px;
      margin: 16px 0 20px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--segment-bg);
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.72), var(--shadow);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      backdrop-filter: saturate(180%) blur(20px);
    }

    .stage-step.segment-button {
      position: relative;
      min-width: 0;
      min-height: 40px;
      padding: 0 14px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      text-align: center;
      cursor: pointer;
      transition: background 180ms ease, box-shadow 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .segment-button .label { display: none; }

    .stage-step.segment-button strong {
      display: block;
      margin: 0;
      overflow: hidden;
      color: inherit;
      font-size: 13px;
      font-weight: 600;
      line-height: 40px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stage-step.segment-button:hover {
      background: rgba(255, 255, 255, 0.52);
      color: var(--ink);
    }

    .stage-step.segment-button:active {
      transform: scale(0.985);
    }

    .stage-step.segment-button:focus-visible {
      outline: 2px solid rgba(0, 113, 227, 0.36);
      outline-offset: 2px;
    }

    .stage-step.segment-button[aria-selected="true"] {
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.08), 0 8px 22px -18px rgba(0, 0, 0, 0.45);
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .metric strong,
    .artifact-nav a {
      display: block;
      margin-top: 5px;
      overflow-wrap: anywhere;
      font-weight: 650;
    }

    .dashboard {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(300px, 0.8fr);
      gap: 16px;
      align-items: start;
    }

    .decision-panel,
    .evidence-board,
    .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .decision-panel {
      padding: clamp(24px, 4vw, 38px);
    }

    .decision-topline {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 22px;
    }

    h2 {
      margin: 0;
      font-size: clamp(24px, 3vw, 36px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: 0;
    }

    h3 {
      margin: 0 0 14px;
      font-size: 14px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .decision-badge {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--ink);
      font-size: 13px;
      font-weight: 650;
    }

    .reasoning {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.65;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-top: 28px;
    }

    .metric {
      min-width: 0;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .metric strong {
      color: var(--ink);
      font-family: "SF Mono", "JetBrains Mono", "SFMono-Regular", ui-monospace, Consolas, monospace;
      font-size: 22px;
      letter-spacing: 0;
    }

    .evidence-board {
      padding: 22px;
    }

    .evidence-list,
    .artifact-list,
    .clean-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .evidence-list li,
    .clean-list li {
      padding: 13px 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      line-height: 1.5;
    }

    .evidence-list li:first-child,
    .clean-list li:first-child {
      border-top: 0;
      padding-top: 0;
    }

    .evidence-list strong {
      display: block;
      color: var(--ink);
      margin-bottom: 4px;
    }

    .risk-next-grid {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
      gap: 16px;
      margin-top: 16px;
    }

    .panel {
      padding: 22px;
    }

    .artifact-nav {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .evidence-data {
      margin-top: 16px;
      padding: 22px;
      overflow-x: auto;
    }

    .evidence-data table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    .evidence-data th,
    .evidence-data td {
      padding: 12px 10px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      text-align: left;
      vertical-align: top;
    }

    .evidence-data th {
      border-top: 0;
      color: var(--ink);
      font-size: 11px;
      font-weight: 650;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .evidence-data td strong {
      display: block;
      color: var(--ink);
      font-weight: 650;
    }

    .artifact-list {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .artifact-list a {
      display: block;
      min-height: 42px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface-soft);
      color: var(--accent);
      text-decoration: none;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .artifact-list a:hover {
      border-color: rgba(0, 113, 227, 0.28);
      background: #ffffff;
      transform: translateY(-1px);
    }

    .artifact-list a:active {
      transform: translateY(0) scale(0.99);
    }

    .stage-detail[hidden] { display: none; }

    code {
      padding: 2px 5px;
      border-radius: 6px;
      background: var(--surface-soft);
      color: var(--ink);
      font-family: "SF Mono", "JetBrains Mono", "SFMono-Regular", ui-monospace, Consolas, monospace;
      font-size: 0.92em;
    }

    @media (max-width: 900px) {
      .dashboard,
      .risk-next-grid {
        grid-template-columns: 1fr;
      }

      .artifact-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 760px) {
      main {
        width: calc(100% - 28px);
        padding: 22px 0 42px;
      }

      header {
        grid-template-columns: 1fr;
        align-items: start;
        gap: 16px;
      }

      .stage-rail.segment-control {
        display: flex;
        overflow-x: auto;
        border-radius: 24px;
        scrollbar-width: none;
      }

      .stage-rail.segment-control::-webkit-scrollbar {
        display: none;
      }

      .stage-step.segment-button {
        flex: 0 0 auto;
        min-width: max-content;
        padding: 0 16px;
      }

      .metrics,
      .artifact-list {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <p class="eyebrow">Startup Playbook</p>
        <h1>Project Name</h1>
        <p class="subtitle">One-line promise.</p>
      </div>
      <div class="status-pill status-waiting" id="stage-status">Validate stage</div>
    </header>

    <nav class="stage-rail segment-control" role="tablist" aria-label="Startup stage pipeline">
      <button class="stage-step segment-button" type="button" role="tab" data-stage-tab="validate" aria-selected="true" aria-controls="stage-panel"><span class="label">Stage 01</span><strong>Validate</strong></button>
      <button class="stage-step segment-button" type="button" role="tab" data-stage-tab="business-model" aria-selected="false" aria-controls="stage-panel"><span class="label">Stage 02</span><strong>Business Model</strong></button>
      <button class="stage-step segment-button" type="button" role="tab" data-stage-tab="build" aria-selected="false" aria-controls="stage-panel"><span class="label">Stage 03</span><strong>Build</strong></button>
      <button class="stage-step segment-button" type="button" role="tab" data-stage-tab="grow" aria-selected="false" aria-controls="stage-panel"><span class="label">Stage 04</span><strong>Grow</strong></button>
      <button class="stage-step segment-button" type="button" role="tab" data-stage-tab="operate" aria-selected="false" aria-controls="stage-panel"><span class="label">Stage 05</span><strong>Operate</strong></button>
    </nav>

    <section class="stage-detail" id="stage-panel" data-stage-panel="validate" role="tabpanel" aria-live="polite"></section>

    <script type="application/json" id="playbook-data">
      {
        "projectId": "project-id",
        "currentStage": "validate",
        "stages": {
          "validate": {
            "label": "Validate",
            "title": "No decision recorded yet",
            "score": null,
            "decision": null,
            "nextAction": "stay",
            "summary": "No decision has been recorded. Add sourced evidence before advancing the pipeline.",
            "evidence": ["No evidence linked yet.", "No known facts recorded yet.", "No assumptions recorded yet."],
            "validationEvidence": [
              {
                "category": "trend",
                "sourceName": "Google Trends",
                "metric": "relative interest",
                "observedValue": "unknown",
                "timeframe": "today 12-m",
                "region": "unknown",
                "interpretation": "Add query-level trend values before completing validation.",
                "confidence": "unknown"
              }
            ],
            "risks": ["Evidence is missing."],
            "nextSteps": ["Capture raw evidence and add evidence IDs.", "Refresh the current stage report and handoff."],
            "links": [
              ["report.md", "stages/validate/report.md"],
              ["report.json", "stages/validate/report.json"],
              ["handoff.json", "stages/validate/handoff.json"],
              ["input.json", "stages/validate/input.json"]
            ]
          },
          "business-model": {
            "label": "Business Model",
            "title": "Business model not run yet",
            "score": null,
            "decision": null,
            "nextAction": "stay",
            "summary": "Run the business-model stage after validation produces a usable handoff.",
            "evidence": ["No business-model evidence linked yet."],
            "risks": ["Pricing and buyer are unknown."],
            "nextSteps": ["Use validate/handoff.json as input."],
            "links": [
              ["report.md", "stages/business-model/report.md"],
              ["report.json", "stages/business-model/report.json"],
              ["handoff.json", "stages/business-model/handoff.json"],
              ["input.json", "stages/business-model/input.json"]
            ]
          },
          "build": {
            "label": "Build",
            "title": "Build not run yet",
            "score": null,
            "decision": null,
            "nextAction": "stay",
            "summary": "Run build only after the promise, buyer, and first paid test are clear.",
            "evidence": ["No build evidence linked yet."],
            "risks": ["Building before validation can hide weak demand."],
            "nextSteps": ["Use business-model/handoff.json as input."],
            "links": [
              ["report.md", "stages/build/report.md"],
              ["report.json", "stages/build/report.json"],
              ["handoff.json", "stages/build/handoff.json"],
              ["input.json", "stages/build/input.json"]
            ]
          },
          "grow": {
            "label": "Grow",
            "title": "Growth not run yet",
            "score": null,
            "decision": null,
            "nextAction": "stay",
            "summary": "Run growth planning after a concrete product surface and conversion action exist.",
            "evidence": ["No growth evidence linked yet."],
            "risks": ["Traffic before conversion clarity wastes effort."],
            "nextSteps": ["Use build/handoff.json as input."],
            "links": [
              ["report.md", "stages/grow/report.md"],
              ["report.json", "stages/grow/report.json"],
              ["handoff.json", "stages/grow/handoff.json"],
              ["input.json", "stages/grow/input.json"]
            ]
          },
          "operate": {
            "label": "Operate",
            "title": "Operate not run yet",
            "score": null,
            "decision": null,
            "nextAction": "stay",
            "summary": "Run operate after real metrics, revenue, or feedback exists.",
            "evidence": ["No operate evidence linked yet."],
            "risks": ["No metrics are available."],
            "nextSteps": ["Use grow/handoff.json as input."],
            "links": [
              ["report.md", "stages/operate/report.md"],
              ["report.json", "stages/operate/report.json"],
              ["handoff.json", "stages/operate/handoff.json"],
              ["input.json", "stages/operate/input.json"]
            ]
          }
        }
      }
    </script>
    <script>
      const playbookData = JSON.parse(document.getElementById("playbook-data").textContent);
      const panel = document.querySelector("[data-stage-panel]");
      const statusPill = document.getElementById("stage-status");
      const tabs = Array.from(document.querySelectorAll("[data-stage-tab]"));

      function listItems(items) {
        return (items || []).map((item) => `<li>${item}</li>`).join("");
      }

      function artifactLinks(links) {
        return (links || []).map(([label, href]) => `<li><a href="${href}">${label}</a></li>`).join("");
      }

      function evidenceRows(items) {
        return (items || []).map((item) => `
          <tr>
            <td><strong>${item.category || "evidence"}</strong>${item.sourceName || "unknown source"}</td>
            <td>${item.metric || "metric"}<br>${item.observedValue || "not recorded"}</td>
            <td>${item.timeframe || "unknown"}<br>${item.region || "unknown"}</td>
            <td>${item.interpretation || "No interpretation recorded."}</td>
            <td>${item.confidence || "unknown"}</td>
          </tr>
        `).join("");
      }

      function switchStage(stageKey) {
        const stage = playbookData.stages[stageKey] || playbookData.stages.validate;
        const validationEvidence = stage.validationEvidence || [];
        panel.dataset.stagePanel = stageKey;
        statusPill.textContent = `${stage.label} stage`;
        tabs.forEach((tab) => {
          const selected = tab.dataset.stageTab === stageKey;
          tab.setAttribute("aria-selected", String(selected));
        });
        panel.innerHTML = `
          <section class="dashboard" aria-label="${stage.label} stage status">
            <article class="decision-panel">
              <div class="decision-topline">
                <h2>${stage.title}</h2>
                <span class="decision-badge">Score: ${stage.score ?? "not scored"}</span>
              </div>
              <p class="reasoning">${stage.summary}</p>
              <div class="metrics">
                <div class="metric"><span class="label">Stage</span><strong>${stageKey}</strong></div>
                <div class="metric"><span class="label">Decision</span><strong>${stage.decision ?? "none"}</strong></div>
                <div class="metric"><span class="label">Next action</span><strong>${stage.nextAction ?? "stay"}</strong></div>
              </div>
            </article>
            <aside class="evidence-board" aria-label="${stage.label} evidence">
              <h3>Evidence / Known Context</h3>
              <ul class="evidence-list">${listItems(stage.evidence)}</ul>
            </aside>
          </section>
          ${validationEvidence.length ? `
            <section class="panel evidence-data" aria-label="${stage.label} validation evidence data">
              <h3>Validation Evidence Data</h3>
              <table>
                <thead>
                  <tr>
                    <th>Source</th>
                    <th>Metric / Value</th>
                    <th>Window</th>
                    <th>Interpretation</th>
                    <th>Confidence</th>
                  </tr>
                </thead>
                <tbody>${evidenceRows(validationEvidence)}</tbody>
              </table>
            </section>
          ` : ""}
          <section class="risk-next-grid" aria-label="${stage.label} risks and next actions">
            <article class="panel"><h3>Risks</h3><ul class="clean-list">${listItems(stage.risks)}</ul></article>
            <article class="panel"><h3>Next Actions</h3><ul class="clean-list">${listItems(stage.nextSteps)}</ul></article>
          </section>
          <nav class="artifact-nav" aria-label="${stage.label} artifact links">
            <ul class="artifact-list">${artifactLinks(stage.links)}</ul>
          </nav>
        `;
      }

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => switchStage(tab.dataset.stageTab));
        tab.addEventListener("keydown", (event) => {
          if (!["ArrowLeft", "ArrowRight"].includes(event.key)) return;
          event.preventDefault();
          const index = tabs.indexOf(tab);
          const nextIndex = event.key === "ArrowRight"
            ? (index + 1) % tabs.length
            : (index - 1 + tabs.length) % tabs.length;
          tabs[nextIndex].focus();
          switchStage(tabs[nextIndex].dataset.stageTab);
        });
      });

      switchStage(playbookData.currentStage || "validate");
    </script>
  </main>
</body>
</html>
